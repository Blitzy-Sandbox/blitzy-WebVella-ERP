openapi: 3.1.0
info:
  title: WebVella ERP - Identity & Access Management API
  version: 1.0.0
  description: Identity and Access Management service for the WebVella ERP platform.
    Provides Cognito-backed authentication (login, token refresh, logout), user management
    (CRUD with role assignments), and role management. Replaces the monolith's SecurityManager,
    AuthService, JwtMiddleware, and SecurityContext with serverless Lambda handlers
    backed by AWS Cognito user pools and DynamoDB.
  contact:
    name: WebVella ERP Team
    url: https://github.com/WebVella/WebVella-ERP
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
- url: http://localhost:4566/restapis/{apiId}/v1/_user_request_
  description: LocalStack
  variables:
    apiId:
      default: local-api
      description: API Gateway REST API identifier (auto-generated by LocalStack)
- url: https://{apiId}.execute-api.{region}.amazonaws.com/v1
  description: Production AWS
  variables:
    apiId:
      default: api-id
      description: API Gateway REST API identifier
    region:
      default: us-east-1
      description: AWS region
security:
- BearerAuth: []
tags:
- name: Authentication
  description: Endpoints for user authentication, token management, and session lifecycle
- name: Users
  description: User account management including CRUD operations and role assignments
- name: Roles
  description: Role management for RBAC-based access control
paths:
  /v1/auth/login:
    post:
      operationId: authLogin
      tags:
      - Authentication
      summary: Authenticate user and obtain JWT tokens
      description: Authenticates a user with email and password credentials against
        the Cognito user pool. Returns a JWT access token, refresh token, and expiration
        timestamp. Maps from the monolith's POST api/v3/en_US/auth/jwt/token endpoint
        (AllowAnonymous). On first login, a Cognito User Migration Lambda trigger
        handles legacy MD5 password verification and migrates the user to Cognito.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid request — missing or malformed email/password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '401':
          description: Authentication failed — invalid credentials or disabled account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
  /v1/auth/refresh:
    post:
      operationId: authRefresh
      tags:
      - Authentication
      summary: Refresh JWT token
      description: Exchanges a valid refresh token for a new access token and refresh
        token pair. Maps from the monolith's POST api/v3/en_US/auth/jwt/token/refresh
        endpoint (AllowAnonymous). The original token's claims are validated and a
        new token pair is issued if the user account is still active and enabled.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refresh successful
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '401':
          description: Refresh token revoked or user account disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
  /v1/auth/logout:
    post:
      operationId: authLogout
      tags:
      - Authentication
      summary: Revoke refresh token
      description: Revokes the provided refresh token, effectively ending the user's
        session. Replaces the monolith's server-side cookie clear from logout.cshtml.cs.
        The access token remains valid until its natural expiration; clients should
        discard it upon logout.
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logout successful — refresh token revoked
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponseEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        revoked:
                          type: boolean
                          description: Indicates the refresh token was successfully
                            revoked
                          examples:
                          - true
        '401':
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
  /v1/identity/users:
    get:
      operationId: listUsers
      tags:
      - Users
      summary: List users
      description: Returns a paginated list of users. Requires administrator role.
        Maps from SecurityManager.GetUsers() which supports filtering by role IDs.
        Supports search by email, username, first name, and last name. Results include
        associated role references.
      security:
      - BearerAuth: []
      parameters:
      - name: page
        in: query
        description: Page number (1-based). Defaults to 1.
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: pageSize
        in: query
        description: Number of items per page. Defaults to 25. Maximum 100.
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
      - name: search
        in: query
        description: Free-text search filter applied to email, username, first name,
          and last name fields
        required: false
        schema:
          type: string
          maxLength: 256
      - name: roleId
        in: query
        description: Filter users by role ID. Multiple values can be provided as comma-separated
          UUIDs.
        required: false
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponseEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        items:
                          type: array
                          items:
                            $ref: '#/components/schemas/User'
                        pagination:
                          $ref: '#/components/schemas/PaginationMeta'
        '401':
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '403':
          description: Forbidden — caller does not have administrator role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
    post:
      operationId: createUser
      tags:
      - Users
      summary: Create user
      description: Creates a new user account in the Cognito user pool and persists
        user metadata to DynamoDB. Requires administrator role. Maps from SecurityManager.SaveUser()
        for new user creation path. Validates email uniqueness, username uniqueness,
        and required fields. Assigns specified roles via Cognito group membership.
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/User'
        '400':
          description: Validation error — invalid email format, duplicate email/username,
            missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '401':
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '403':
          description: Forbidden — caller does not have administrator role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '409':
          description: Conflict — email or username already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
  /v1/identity/users/{userId}:
    parameters:
    - name: userId
      in: path
      required: true
      description: Unique identifier of the user (UUID)
      schema:
        type: string
        format: uuid
    get:
      operationId: getUser
      tags:
      - Users
      summary: Get user by ID
      description: Retrieves a single user by their unique identifier. Returns user
        profile including associated roles. Maps from SecurityManager.GetUser(Guid
        userId) which queries the user entity with role relations via EQL.
      security:
      - BearerAuth: []
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '403':
          description: Forbidden — non-admin users may only access their own profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
    put:
      operationId: updateUser
      tags:
      - Users
      summary: Update user
      description: Updates an existing user's profile information and role assignments.
        Maps from SecurityManager.SaveUser() for the update path. Validates email
        and username uniqueness if changed. Password updates are applied to the Cognito
        user pool. Role changes are reflected in Cognito group membership.
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/User'
        '400':
          description: Validation error — invalid email format, duplicate email/username,
            or constraint violation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '401':
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '403':
          description: Forbidden — caller does not have administrator role or is not
            the target user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '409':
          description: Conflict — email or username already registered to another
            user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
    delete:
      operationId: deleteUser
      tags:
      - Users
      summary: Delete user
      description: Deletes a user account from the Cognito user pool and removes all
        associated metadata from DynamoDB. Requires administrator role. The system
        user (id 10000000-0000-0000-0000-000000000000) cannot be deleted. Publishes
        an identity.user.deleted domain event via SNS.
      security:
      - BearerAuth: []
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponseEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        deleted:
                          type: boolean
                          description: Indicates the user was successfully deleted
                          examples:
                          - true
        '401':
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '403':
          description: Forbidden — caller does not have administrator role or attempted
            to delete the system user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
  /v1/identity/users/me:
    get:
      operationId: getCurrentUser
      tags:
      - Users
      summary: Get current authenticated user profile
      description: Returns the profile of the currently authenticated user based on
        the JWT claims. Maps from the monolith's SecurityContext.CurrentUser pattern
        which resolves the user from the ClaimsPrincipal. Includes full role membership
        information.
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
  /v1/identity/roles:
    get:
      operationId: listRoles
      tags:
      - Roles
      summary: List roles
      description: 'Returns all roles in the system. Maps from SecurityManager.GetAllRoles()
        which queries the role entity via EQL. The system ships with three built-in
        roles: administrator (BDC56420-CAF0-4030-8A0E-D264938E0CDA), regular (F16EC6DB-626D-4C27-8DE0-3E7CE542C55F),
        and guest (987148B1-AFA8-4B33-8616-55861E5FD065).'
      security:
      - BearerAuth: []
      responses:
        '200':
          description: List of all roles
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponseEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        items:
                          type: array
                          items:
                            $ref: '#/components/schemas/Role'
        '401':
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
    post:
      operationId: createRole
      tags:
      - Roles
      summary: Create role
      description: Creates a new role. Maps from SecurityManager.SaveRole() for the
        creation path. Validates that the role name is unique and not empty. Creates
        a corresponding Cognito group. Requires administrator role.
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: Role created successfully
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/Role'
        '400':
          description: Validation error — missing name or duplicate role name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '401':
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '403':
          description: Forbidden — caller does not have administrator role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '409':
          description: Conflict — role with the same name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
  /v1/identity/roles/{roleId}:
    parameters:
    - name: roleId
      in: path
      required: true
      description: Unique identifier of the role (UUID)
      schema:
        type: string
        format: uuid
    get:
      operationId: getRole
      tags:
      - Roles
      summary: Get role by ID
      description: Retrieves a single role by its unique identifier. Returns role
        metadata including name and description.
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Role found
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/Role'
        '401':
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
    put:
      operationId: updateRole
      tags:
      - Roles
      summary: Update role
      description: Updates an existing role's name and description. Maps from SecurityManager.SaveRole()
        for the update path. Validates that the new name is unique if changed. Built-in
        system roles (administrator, regular, guest) have restricted name changes.
        Requires administrator role.
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Role updated successfully
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponseEnvelope'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/Role'
        '400':
          description: Validation error — missing name or duplicate role name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '401':
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '403':
          description: Forbidden — caller does not have administrator role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '409':
          description: Conflict — another role with the same name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
    delete:
      operationId: deleteRole
      tags:
      - Roles
      summary: Delete role
      description: Deletes a custom role. Built-in system roles (administrator, regular,
        guest) cannot be deleted. Removes the corresponding Cognito group. Any users
        assigned to this role will have the assignment revoked. Requires administrator
        role. Publishes an identity.role.deleted domain event via SNS.
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Role deleted successfully
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponseEnvelope'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        deleted:
                          type: boolean
                          description: Indicates the role was successfully deleted
                          examples:
                          - true
        '401':
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '403':
          description: Forbidden — caller does not have administrator role or attempted
            to delete a system role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEnvelope'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Cognito JWT access token. Obtain via POST /v1/auth/login. Include
        in the Authorization header as: Bearer <token>. Tokens are validated by the
        HTTP API Gateway JWT authorizer (production) or a custom Lambda authorizer
        (LocalStack).'
  schemas:
    LoginRequest:
      type: object
      description: Credentials for user authentication. Maps from JwtTokenLoginModel
        (Email, Password).
      properties:
        email:
          type: string
          format: email
          description: User email address (case-insensitive)
          maxLength: 256
          examples:
          - erp@webvella.com
        password:
          type: string
          format: password
          description: User password (plaintext; validated against Cognito or legacy
            MD5 via migration trigger)
          minLength: 1
          maxLength: 256
      required:
      - email
      - password
    LoginResponse:
      type: object
      description: JWT token pair returned upon successful authentication. The access
        token contains claims for user ID, email, and role memberships. Token expiry
        is 1440 minutes (24 hours) with a recommended refresh interval of 120 minutes,
        matching the monolith's AuthService constants JWT_TOKEN_EXPIRY_DURATION_MINUTES
        and JWT_TOKEN_FORCE_REFRESH_MINUTES.
      properties:
        token:
          type: string
          description: JWT access token for API authorization
          examples:
          - eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          description: Opaque refresh token for obtaining new access tokens
          examples:
          - dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4...
        expiresAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the access token expires
          examples:
          - '2025-12-31T23:59:59Z'
        refreshExpiresAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the refresh token expires
          examples:
          - '2026-01-30T23:59:59Z'
        tokenType:
          type: string
          description: Token type, always 'Bearer'
          enum:
          - Bearer
          default: Bearer
      required:
      - token
      - refreshToken
      - expiresAt
      - tokenType
    RefreshRequest:
      type: object
      description: Request body for token refresh. Maps from JwtTokenModel (Token).
      properties:
        refreshToken:
          type: string
          description: The refresh token obtained from the login response
          minLength: 1
      required:
      - refreshToken
    LogoutRequest:
      type: object
      description: Request body for logout / refresh token revocation.
      properties:
        refreshToken:
          type: string
          description: The refresh token to revoke
          minLength: 1
      required:
      - refreshToken
    User:
      type: object
      description: 'User account representation. Derived from the monolith''s ErpUser
        model (SecurityManager) with fields mapped from the rec_user table: id, username,
        email, password, first_name, last_name, image, created_on, last_logged_in,
        enabled, verified. Cognito attributes are mapped to these properties.'
      properties:
        id:
          type: string
          format: uuid
          description: Unique user identifier
          examples:
          - eabd66fd-8de1-4d79-9674-447ee89921c2
        email:
          type: string
          format: email
          description: User email address (unique)
          maxLength: 256
          examples:
          - erp@webvella.com
        username:
          type: string
          description: Username (unique)
          maxLength: 256
          examples:
          - erpadmin
        firstName:
          type: string
          description: User first name
          maxLength: 256
          examples:
          - ERP
        lastName:
          type: string
          description: User last name
          maxLength: 256
          examples:
          - Admin
        enabled:
          type: boolean
          description: Whether the user account is active and allowed to authenticate
          examples:
          - true
        verified:
          type: boolean
          description: Whether the user's email has been verified
          examples:
          - true
        image:
          type: string
          description: URL or path to the user's profile image
          nullable: true
          examples:
          - /images/avatar-default.png
        roles:
          type: array
          description: List of roles assigned to the user
          items:
            $ref: '#/components/schemas/RoleReference'
        createdOn:
          type: string
          format: date-time
          description: ISO 8601 timestamp of account creation
          examples:
          - '2025-01-15T10:30:00Z'
        lastModifiedOn:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the last profile update
          examples:
          - '2025-06-20T14:45:00Z'
        lastLoggedIn:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the user's most recent login
          nullable: true
          examples:
          - '2025-12-01T09:00:00Z'
      required:
      - id
      - email
      - username
      - firstName
      - lastName
      - enabled
      - verified
      - roles
      - createdOn
      - lastModifiedOn
    RoleReference:
      type: object
      description: Lightweight role reference embedded in user objects
      properties:
        id:
          type: string
          format: uuid
          description: Role unique identifier
          examples:
          - bdc56420-caf0-4030-8a0e-d264938e0cda
        name:
          type: string
          description: Role name
          examples:
          - administrator
      required:
      - id
      - name
    CreateUserRequest:
      type: object
      description: Request body for creating a new user. Maps from SecurityManager.SaveUser()
        creation path which requires email, username, password, first_name, last_name,
        and optional fields. Role assignments are provided as an array of role IDs.
      properties:
        email:
          type: string
          format: email
          description: User email address (must be unique)
          maxLength: 256
        username:
          type: string
          description: Username (must be unique)
          maxLength: 256
        password:
          type: string
          format: password
          description: Initial password for the account
          minLength: 6
          maxLength: 256
        firstName:
          type: string
          description: User first name
          maxLength: 256
        lastName:
          type: string
          description: User last name
          maxLength: 256
        enabled:
          type: boolean
          description: Whether the account should be immediately active. Defaults
            to true.
          default: true
        verified:
          type: boolean
          description: Whether the user's email is pre-verified. Defaults to false.
          default: false
        image:
          type: string
          description: URL or path to the user's profile image
          nullable: true
        roles:
          type: array
          description: Array of role IDs to assign to the user
          items:
            type: string
            format: uuid
          examples:
          - - f16ec6db-626d-4c27-8de0-3e7ce542c55f
      required:
      - email
      - username
      - password
      - firstName
      - lastName
    UpdateUserRequest:
      type: object
      description: Request body for updating an existing user. All fields are optional;
        only provided fields are updated. Maps from SecurityManager.SaveUser() update
        path which compares each field to the existing value before applying changes.
      properties:
        email:
          type: string
          format: email
          description: New email address (must be unique if changed)
          maxLength: 256
        username:
          type: string
          description: New username (must be unique if changed)
          maxLength: 256
        password:
          type: string
          format: password
          description: New password. Only applied if non-empty.
          minLength: 6
          maxLength: 256
        firstName:
          type: string
          description: Updated first name
          maxLength: 256
        lastName:
          type: string
          description: Updated last name
          maxLength: 256
        enabled:
          type: boolean
          description: Enable or disable the account
        verified:
          type: boolean
          description: Set email verification status
        image:
          type: string
          description: URL or path to the user's profile image
          nullable: true
        roles:
          type: array
          description: Complete replacement list of role IDs. Omit to leave roles
            unchanged.
          items:
            type: string
            format: uuid
    Role:
      type: object
      description: 'Role definition for RBAC access control. Derived from the monolith''s
        ErpRole model. System ships with three built-in roles: administrator (BDC56420-CAF0-4030-8A0E-D264938E0CDA),
        regular (F16EC6DB-626D-4C27-8DE0-3E7CE542C55F), guest (987148B1-AFA8-4B33-8616-55861E5FD065).'
      properties:
        id:
          type: string
          format: uuid
          description: Unique role identifier
          examples:
          - bdc56420-caf0-4030-8a0e-d264938e0cda
        name:
          type: string
          description: Role name (unique, used for Cognito group name)
          maxLength: 128
          examples:
          - administrator
        description:
          type: string
          description: Human-readable description of the role's purpose
          maxLength: 1024
          examples:
          - Full system access with all administrative privileges
        createdOn:
          type: string
          format: date-time
          description: ISO 8601 timestamp of role creation
          examples:
          - '2025-01-01T00:00:00Z'
        lastModifiedOn:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the last role update
          examples:
          - '2025-01-01T00:00:00Z'
      required:
      - id
      - name
      - description
    CreateRoleRequest:
      type: object
      description: Request body for creating a new role. Maps from SecurityManager.SaveRole()
        creation path which requires a unique name. A corresponding Cognito group
        is created automatically.
      properties:
        name:
          type: string
          description: Role name (must be unique)
          minLength: 1
          maxLength: 128
        description:
          type: string
          description: Description of the role's purpose. Defaults to empty string.
          maxLength: 1024
          default: ''
      required:
      - name
    UpdateRoleRequest:
      type: object
      description: Request body for updating an existing role. Maps from SecurityManager.SaveRole()
        update path. Name is validated for uniqueness if changed.
      properties:
        name:
          type: string
          description: Updated role name (must be unique if changed)
          minLength: 1
          maxLength: 128
        description:
          type: string
          description: Updated role description
          maxLength: 1024
    ApiResponseEnvelope:
      type: object
      description: Standard API response envelope matching the monolith's BaseResponseModel
        pattern. All API responses are wrapped in this envelope to provide consistent
        error handling, timestamps, and success indicators across all endpoints.
      properties:
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the response generation
          examples:
          - '2025-12-15T10:30:00Z'
        success:
          type: boolean
          description: Indicates whether the request was processed successfully
          examples:
          - true
        message:
          type: string
          description: Human-readable status message. Empty on success, error details
            on failure.
          examples:
          - ''
        errors:
          type: array
          description: List of validation or processing errors. Empty array on success.
          items:
            $ref: '#/components/schemas/ErrorModel'
        data:
          description: Response payload. Structure varies by endpoint. Null on error
            responses.
      required:
      - timestamp
      - success
      - message
      - errors
    ErrorModel:
      type: object
      description: Individual error detail matching the monolith's ErrorModel (BaseModels.cs).
        Provides structured error information with a field key for client-side form
        validation binding.
      properties:
        key:
          type: string
          description: Field or domain key identifying the error source (e.g., 'email',
            'username', 'password')
          examples:
          - email
        value:
          type: string
          description: The invalid value that caused the error (may be empty for security-sensitive
            fields)
          examples:
          - invalid@email
        message:
          type: string
          description: Human-readable error description
          examples:
          - Email is already registered to another user. It must be unique.
      required:
      - key
      - value
      - message
    PaginationMeta:
      type: object
      description: Pagination metadata for list endpoints
      properties:
        page:
          type: integer
          description: Current page number (1-based)
          minimum: 1
          examples:
          - 1
        pageSize:
          type: integer
          description: Number of items per page
          minimum: 1
          maximum: 100
          examples:
          - 25
        totalCount:
          type: integer
          description: Total number of items matching the query across all pages
          minimum: 0
          examples:
          - 42
        totalPages:
          type: integer
          description: Total number of pages based on pageSize
          minimum: 0
          examples:
          - 2
      required:
      - page
      - pageSize
      - totalCount
      - totalPages
