          type: array
          description: Matched contact records.
          items:
            $ref: "#/components/schemas/CrmSearchHit"
        totalCount:
          type: integer
          description: Total number of matching records across all entity types.

    CrmSearchHit:
      type: object
      description: >
        Individual search result entry. Contains the matched entity record
        along with metadata about the match.
      required:
        - id
        - entityType
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier of the matched record.
        entityType:
          type: string
          enum:
            - account
            - contact
          description: Type of entity that matched.
        name:
          type: string
          description: Display name of the matched record.
        email:
          type: string
          format: email
          description: Email address of the matched record (if available).
        xSearch:
          type: string
          description: >
            The x_search composite field value that was matched against.
        matchedFields:
          type: array
          description: >
            List of field names where the search query matched within the
            x_search composite string.
          items:
            type: string
