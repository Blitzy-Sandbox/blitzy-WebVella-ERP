        color:
          type: string
          nullable: true
          description: Optional color code for the option
    FieldPermissions:
      type: object
      description: Field-level permission configuration
      properties:
        canRead:
          type: array
          items:
            type: string
            format: uuid
          description: List of role IDs permitted to read this field
        canUpdate:
          type: array
          items:
            type: string
            format: uuid
          description: List of role IDs permitted to update this field
    EntityRelationType:
      type: integer
      description: Enumeration of supported entity relation types
      enum:
      - 1
      - 2
      - 3
      x-enum-descriptions:
      - OneToOne — Each origin record maps to at most one target record
      - OneToMany — Each origin record can map to multiple target records
      - ManyToMany — Multiple origin records map to multiple target records via join
        table
    EntityRelation:
      type: object
      description: 'Complete entity relation definition specifying the typed association
        between two entities including origin/target entity and field bindings.

        '
      required:
      - id
      - name
      - relationType
      - originEntityId
      - originFieldId
      - targetEntityId
      - targetFieldId
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier of the relation
        name:
          type: string
          description: Unique relation name
          example: customer_order_relation
        label:
          type: string
          nullable: true
          description: Human-readable relation label
          example: Customer Orders
        description:
          type: string
          nullable: true
          description: Description of the relation's purpose
        system:
          type: boolean
          description: Whether this is a system relation (cannot be deleted)
          default: false
        relationType:
          $ref: '#/components/schemas/EntityRelationType'
        originEntityId:
          type: string
          format: uuid
          description: ID of the origin (source) entity
        originFieldId:
          type: string
          format: uuid
          description: ID of the origin entity's key field
        targetEntityId:
          type: string
          format: uuid
          description: ID of the target (destination) entity
        targetFieldId:
          type: string
          format: uuid
          description: ID of the target entity's key field
        originEntityName:
          type: string
          nullable: true
          description: Name of the origin entity (read-only, populated by server)
        originFieldName:
          type: string
          nullable: true
          description: Name of the origin entity's key field (read-only)
        targetEntityName:
          type: string
          nullable: true
          description: Name of the target entity (read-only, populated by server)
        targetFieldName:
          type: string
          nullable: true
          description: Name of the target entity's key field (read-only)
    InputEntityRelation:
      type: object
      description: Input model for creating or updating an entity relation
      required:
      - name
      - relationType
      - originEntityId
      - originFieldId
      - targetEntityId
      - targetFieldId
      properties:
        id:
          type: string
          format: uuid
          nullable: true
          description: Optional pre-assigned UUID. Auto-generated if not provided.
        name:
          type: string
          description: Unique relation name
        label:
          type: string
          nullable: true
          description: Human-readable relation label
        description:
          type: string
          nullable: true
          description: Description of the relation
        system:
          type: boolean
          nullable: true
          default: false
        relationType:
          $ref: '#/components/schemas/EntityRelationType'
        originEntityId:
          type: string
          format: uuid
          description: ID of the origin entity
        originFieldId:
          type: string
          format: uuid
          description: ID of the origin entity's key field
        targetEntityId:
          type: string
          format: uuid
          description: ID of the target entity
        targetFieldId:
          type: string
          format: uuid
          description: ID of the target entity's key field
    InputEntityRelationRecordUpdate:
      type: object
      description: 'Model for updating relation record attachments. Used to attach
        and/or detach target records from an origin record through a many-to-many
        relation.

        '
      required:
      - relationName
      - originFieldRecordId
      properties:
        relationName:
          type: string
          description: Name of the relation to manage
        originFieldRecordId:
          type: string
          format: uuid
          description: UUID of the origin record
        attachTargetFieldRecordIds:
          type: array
          items:
            type: string
            format: uuid
          description: List of target record IDs to attach to the origin
        detachTargetFieldRecordIds:
          type: array
          items:
            type: string
            format: uuid
          description: List of target record IDs to detach from the origin
    EntityRecord:
      type: object
      description: 'Dynamic entity record represented as a key-value object. Keys
        correspond to field names defined on the owning entity. The id property is
        always present and is a UUID. Additional properties contain field values whose
        types depend on their field definitions.

        '
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier of the record
      additionalProperties: true
    EqlQuery:
      type: object
      description: 'EQL query execution request. Contains the query string using Entity
        Query Language syntax (SELECT/FROM/WHERE/ORDER/PAGE/PAGESIZE) and optional
        typed parameters for parameterized queries.

        '
      required:
      - eql
      properties:
        eql:
          type: string
          description: 'EQL query string. Example: SELECT * FROM customer WHERE name
            CONTAINS @searchTerm ORDER BY created_on DESC PAGE 1 PAGESIZE 25

            '
          example: SELECT id,name FROM customer WHERE status = @status ORDER BY name
            ASC PAGE 1 PAGESIZE 50
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/EqlParameter'
          description: List of typed parameters to bind into the query
          default: []
    EqlParameter:
      type: object
      description: 'Typed parameter for EQL queries. Parameter names must start with
        @. The type hint helps the query adapter choose correct serialization.

        '
      required:
      - name
      - value
      properties:
        name:
          type: string
          description: Parameter name (must start with @)
          pattern: ^@
          example: '@status'
        value:
          description: Parameter value (type determined by the type field)
          example: active
        type:
          type: string
          nullable: true
          description: Type hint for parameter serialization
          enum:
          - text
          - bool
          - date
          - int
          - decimal
          - guid
          example: text
    EqlDataSourceQuery:
      type: object
      description: 'Named datasource execution request. References a pre-registered
        datasource by name and provides runtime parameter values.

        '
      required:
      - name
      properties:
        name:
          type: string
          description: Registered datasource name
          example: active_customers_report
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/EqlParameter'
          description: Runtime parameter values for the datasource
          default: []
    QueryResponse:
      type: object
      description: Standard response structure for query and datasource execution
        results
      properties:
        list:
          type: array
          items:
            $ref: '#/components/schemas/EntityRecord'
          description: Query result records
        totalCount:
          type: integer
          nullable: true
          description: Total count of matching records (when return_total is true)
          minimum: 0
    DataSourceParameter:
      type: object
      description: Parameter definition for a datasource
      required:
      - name
      - type
      properties:
        name:
          type: string
          description: Parameter name
          example: startDate
        type:
          type: string
          description: Parameter data type
          example: date
        value:
          type: string
          nullable: true
          description: Default or test value for the parameter
        ignore_parse_errors:
          type: boolean
          description: Whether to ignore type parsing errors for this parameter
          default: false
    DataSourceTestModel:
      type: object
      description: 'Model for testing a datasource definition inline. Provides the
        datasource EQL or action, parameters, and execution options.

        '
      properties:
        action:
          type: string
          nullable: true
          description: Datasource action type identifier
        eql:
          type: string
          nullable: true
          description: EQL query string for the datasource
        parameters:
          type: string
          nullable: true
          description: JSON-encoded parameter values string
        param_list:
          type: array
          items:
            $ref: '#/components/schemas/DataSourceParameter'
          description: Structured parameter definitions
        return_total:
          type: boolean
          description: Whether to include total record count in results
          default: true
    DataSourceCodeTestModel:
      type: object
      description: 'Model for compiling and testing a code-based datasource definition.
        Contains the C# source code to be compiled and validated.

        '
      required:
      - csCode
      properties:
        csCode:
          type: string
          description: C# source code of the code-based datasource
    ImportResult:
      type: object
      description: Result summary of a CSV record import operation
      properties:
        created:
          type: integer
          description: Number of records successfully created
          minimum: 0
        updated:
          type: integer
          description: Number of records successfully updated
          minimum: 0
        skipped:
          type: integer
          description: Number of records skipped (no changes detected)
          minimum: 0
        errors:
          type: integer
          description: Number of records that failed to import
          minimum: 0
        errorDetails:
          type: array
          items:
            $ref: '#/components/schemas/ImportRowError'
          description: Detailed error information for failed rows
        totalProcessed:
          type: integer
          description: Total number of rows processed from the CSV
          minimum: 0
    ImportEvaluationResult:
      type: object
      description: 'Detailed evaluation report from a dry-run CSV import. Contains
        per-row validation results without committing any changes.

        '
      properties:
        isValid:
          type: boolean
          description: Whether the CSV file passed all validation checks
        totalRows:
          type: integer
          description: Total number of data rows in the CSV file
          minimum: 0
        validRows:
          type: integer
          description: Number of rows that passed validation
          minimum: 0
        invalidRows:
          type: integer
          description: Number of rows that failed validation
          minimum: 0
        columnMappings:
          type: array
          items:
            $ref: '#/components/schemas/ColumnMapping'
          description: Mapping of CSV columns to entity fields
        rowErrors:
          type: array
          items:
            $ref: '#/components/schemas/ImportRowError'
          description: Per-row validation error details
    ImportRowError:
      type: object
      description: Error detail for a single import row
      properties:
        rowNumber:
          type: integer
          description: 1-based row number in the CSV file
          minimum: 1
        fieldName:
          type: string
          nullable: true
          description: Name of the field that caused the error
        errorMessage:
          type: string
          description: Human-readable error description
        rawValue:
          type: string
          nullable: true
          description: The raw CSV value that caused the error
    ColumnMapping:
      type: object
      description: Mapping between a CSV column header and an entity field
      properties:
        csvColumn:
          type: string
          description: Column header name from the CSV file
        fieldName:
          type: string
          nullable: true
          description: Matched entity field name (null if unmatched)
        fieldType:
          $ref: '#/components/schemas/FieldType'
        matched:
          type: boolean
          description: Whether the CSV column was matched to an entity field
