              type: string
            symbolPlacement:
              type: string
              enum:
              - before
              - after
        options:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/SelectOption'
        format:
          type: string
          nullable: true
        useCurrentTimeAsDefaultValue:
          type: boolean
          nullable: true
        openTargetInNewWindow:
          type: boolean
          nullable: true
        maxCount:
          type: integer
          nullable: true
        autoNumberTemplate:
          type: string
          nullable: true
        autoNumberStartValue:
          type: integer
          nullable: true
        encrypted:
          type: boolean
          nullable: true
        generateNewId:
          type: boolean
          nullable: true
        srid:
          type: integer
