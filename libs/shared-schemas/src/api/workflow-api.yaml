          description: UTC start date for the schedule plan
        endDate:
          type: string
          format: date-time
          nullable: true
          description: UTC end date for the schedule plan (null for open-ended)
        scheduledDays:
          $ref: '#/components/schemas/SchedulePlanDaysOfWeek'
        intervalInMinutes:
          type: integer
          nullable: true
          description: 'Repeat interval in minutes (only for Interval type)

            '
        startTimespan:
          type: string
          format: date-time
          nullable: true
          description: 'Daily window start time.  In the monolith this is stored as
            integer minutes-since-midnight; the output converts to ISO-8601 date-time
            for API consumers.

            '
        endTimespan:
          type: string
          format: date-time
          nullable: true
          description: 'Daily window end time.  In the monolith this is stored as
            integer minutes-since-midnight; the output converts to ISO-8601 date-time
            for API consumers.

            '
        lastTriggerTime:
          type: string
          format: date-time
          nullable: true
          description: 'UTC timestamp of the last time this plan triggered a job

            '
        nextTriggerTime:
          type: string
          format: date-time
          nullable: true
          description: 'UTC timestamp of the next scheduled trigger.  Recalculated
            automatically after each update or trigger.

            '
        jobTypeId:
          type: string
          format: uuid
          description: Reference to the registered job type
        jobType:
          $ref: '#/components/schemas/JobType'
        jobAttributes:
          type: object
          additionalProperties: true
          nullable: true
          description: 'Arbitrary JSON attributes passed to jobs created by this plan

            '
        enabled:
          type: boolean
          description: Whether the schedule plan is currently active
        lastStartedJobId:
          type: string
          format: uuid
          nullable: true
          description: 'ID of the most recently started job spawned by this plan

            '
        createdOn:
          type: string
          format: date-time
          description: UTC timestamp when the schedule plan was created
        lastModifiedBy:
          type: string
          format: uuid
          nullable: true
          description: 'UUID of the user who last modified the schedule plan

            '
        lastModifiedOn:
          type: string
          format: date-time
