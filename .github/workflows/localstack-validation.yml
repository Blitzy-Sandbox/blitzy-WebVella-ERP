##############################################################################
# WebVella ERP Microservices — E2E LocalStack Validation Pipeline
#
# GitHub Actions workflow for end-to-end validation of the entire
# microservice architecture using LocalStack in Docker containers.
#
# This workflow:
#   1. Checks out the repository and sets up .NET 10 SDK
#   2. Restores NuGet packages for the integration test project
#   3. Spins up the full Docker Compose LocalStack stack
#      (LocalStack + 4 PostgreSQL instances + Redis + RabbitMQ +
#       Core/CRM/Project/Mail/Reporting/Admin services + Gateway)
#   4. Waits for LocalStack health and Gateway readiness
#   5. Runs the cross-service integration test suite which validates:
#      - Message flow through SNS/SQS via LocalStack
#      - File operations through S3 via LocalStack
#      - Cross-service business rules and gRPC calls
#      - Schema migration integrity (zero data loss)
#      - JWT token propagation across service boundaries
#      - BaseResponseModel envelope backward compatibility
#   6. Collects test results and Docker logs as artifacts
#   7. Tears down the stack (always, even on failure)
#
# Per AAP Sections 0.4.1, 0.5.1, 0.7.4, 0.8.1, 0.8.2, and 0.8.3.
#
# Key AAP constraints:
#   - All cloud-native features validated against LocalStack only
#   - No external cloud dependencies (AAP 0.8.3)
#   - LocalStack endpoint injectable via environment variables (AAP 0.8.3)
#   - Every cross-service business rule has an integration test (AAP 0.8.2)
#   - docker-compose.localstack.yml brings up a fully functional stack
#     that passes all integration tests (AAP 0.8.3)
#
# Infrastructure:
#   - LocalStack (SQS, SNS, S3) on port 4566
#   - PostgreSQL 16 per service (core, crm, project, mail)
#   - Redis 7 for distributed caching
#   - RabbitMQ 3 as messaging fallback
#   - API Gateway on port 5000 (preserving /api/v3/ contract)
##############################################################################

name: "E2E - LocalStack Validation"

# ---------------------------------------------------------------------------
# Trigger events (AAP 0.4.1 — E2E with LocalStack)
# ---------------------------------------------------------------------------
on:
  # Run on pushes to main branch
  push:
    branches:
      - main

  # Run on pull requests targeting main
  pull_request:
    branches:
      - main

  # Allow manual triggering from the Actions tab
  workflow_dispatch:

  # Nightly scheduled run (02:00 UTC) to catch environment drift
  schedule:
    - cron: "0 2 * * *"

# ---------------------------------------------------------------------------
# Concurrency: Cancel in-progress runs for the same branch/PR to save
# resources. LocalStack stacks are heavy and should not run in parallel
# for the same ref.
# ---------------------------------------------------------------------------
concurrency:
  group: localstack-e2e-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Environment variables shared across all steps
# These follow the injectable configuration pattern required by AAP 0.8.3,
# allowing seamless switching between LocalStack and production AWS endpoints.
# ---------------------------------------------------------------------------
env:
  # .NET build configuration
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  NUGET_XMLDOC_MODE: skip

  # Docker Compose project name for isolation
  COMPOSE_PROJECT_NAME: erp-localstack-e2e

  # AWS / LocalStack configuration (injectable per AAP 0.8.3)
  AWS__ServiceURL: "http://localhost:4566"
  AWS__AuthenticationRegion: "us-east-1"
  AWS__UseHttp: "true"
  AWS__UseLocalStack: "true"
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"
  AWS_DEFAULT_REGION: "us-east-1"

  # Gateway base URL for integration tests
  Gateway__BaseUrl: "http://localhost:5000"

  # Direct database connection strings for integration tests that verify
  # schema migration and data integrity (AAP 0.8.1 — zero data loss).
  # Port mappings match docker-compose.localstack.yml host ports.
  ConnectionStrings__Core: "Host=localhost;Port=15432;Database=erp_core;Username=dev;Password=dev;Pooling=true;MinPoolSize=1;MaxPoolSize=20;CommandTimeout=120;"
  ConnectionStrings__Crm: "Host=localhost;Port=15433;Database=erp_crm;Username=dev;Password=dev;Pooling=true;MinPoolSize=1;MaxPoolSize=20;CommandTimeout=120;"
  ConnectionStrings__Project: "Host=localhost;Port=15434;Database=erp_project;Username=dev;Password=dev;Pooling=true;MinPoolSize=1;MaxPoolSize=20;CommandTimeout=120;"
  ConnectionStrings__Mail: "Host=localhost;Port=15435;Database=erp_mail;Username=dev;Password=dev;Pooling=true;MinPoolSize=1;MaxPoolSize=20;CommandTimeout=120;"

  # Redis connection for cache invalidation event tests
  Redis__ConnectionString: "localhost:16379"

  # Messaging configuration pointing to LocalStack SNS/SQS
  Messaging__Transport: "AmazonSQS"
  Messaging__AmazonSQS__ServiceURL: "http://localhost:4566"
  Messaging__AmazonSQS__Region: "us-east-1"
  Messaging__AmazonSQS__AccessKey: "test"
  Messaging__AmazonSQS__SecretKey: "test"

  # JWT settings matching docker-compose.localstack.yml values
  Jwt__Key: "ThisIsMySecretKeyThisIsMySecretKeyThisIsMySecretKey"
  Jwt__Issuer: "webvella-erp"
  Jwt__Audience: "webvella-erp"

  # S3 file storage via LocalStack
  Storage__Provider: "S3"
  Storage__S3__ServiceURL: "http://localhost:4566"
  Storage__S3__BucketName: "erp-files"
  Storage__S3__Region: "us-east-1"
  Storage__S3__AccessKey: "test"
  Storage__S3__SecretKey: "test"
  Storage__S3__ForcePathStyle: "true"

jobs:
  # =========================================================================
  # E2E Integration Tests against LocalStack
  # =========================================================================
  localstack-e2e:
    name: "E2E Integration Tests (LocalStack)"
    runs-on: ubuntu-latest

    # 90-minute timeout — LocalStack stack build + service startup + tests
    timeout-minutes: 90

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # Step 2: Set up .NET 10 SDK (matching net10.0 target framework)
      # -----------------------------------------------------------------------
      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # -----------------------------------------------------------------------
      # Step 3: Verify Docker Compose V2 availability
      # Docker and Docker Compose V2 are pre-installed on ubuntu-latest.
      # This step validates availability and logs versions for debugging.
      # -----------------------------------------------------------------------
      - name: Verify Docker and Docker Compose
        run: |
          echo "=== Docker version ==="
          docker version --format '{{.Server.Version}}'
          echo ""
          echo "=== Docker Compose version ==="
          docker compose version
          echo ""
          echo "=== Available disk space ==="
          df -h /
          echo ""
          echo "=== Available memory ==="
          free -h

      # -----------------------------------------------------------------------
      # Step 4: Restore NuGet packages for the integration test project
      # This ensures all test dependencies (Testcontainers, AWS SDKs,
      # MassTransit, gRPC clients, xUnit, FluentAssertions) are available
      # before the tests run.
      # -----------------------------------------------------------------------
      - name: Restore NuGet packages
        run: |
          dotnet restore tests/WebVella.Erp.Tests.Integration/WebVella.Erp.Tests.Integration.csproj \
            --verbosity minimal

      # -----------------------------------------------------------------------
      # Step 5: Build integration test project (Release configuration)
      # Build before starting containers to fail fast on compilation errors.
      # -----------------------------------------------------------------------
      - name: Build integration test project
        run: |
          dotnet build tests/WebVella.Erp.Tests.Integration/WebVella.Erp.Tests.Integration.csproj \
            --configuration Release \
            --no-restore \
            --verbosity minimal

      # -----------------------------------------------------------------------
      # Step 6: Ensure LocalStack init script is executable
      # The init-aws.sh script provisions SNS topics, SQS queues, and S3
      # buckets inside LocalStack. It is auto-run by LocalStack on startup
      # via the ready.d volume mount in docker-compose.localstack.yml.
      # -----------------------------------------------------------------------
      - name: Prepare LocalStack init script
        run: |
          if [ -f infrastructure/localstack/init-aws.sh ]; then
            chmod +x infrastructure/localstack/init-aws.sh
            echo "LocalStack init script found and made executable."
            echo "--- Script contents ---"
            cat infrastructure/localstack/init-aws.sh
          else
            echo "WARNING: infrastructure/localstack/init-aws.sh not found."
            echo "LocalStack resources (SNS/SQS/S3) may not be provisioned."
          fi

      # -----------------------------------------------------------------------
      # Step 7: Start the full LocalStack Docker Compose stack
      #
      # Uses docker-compose.localstack.yml as a standalone stack (per its
      # documented usage). This file defines the complete infrastructure:
      #   - LocalStack (SNS, SQS, S3) with init-aws.sh auto-provisioning
      #   - 4 PostgreSQL instances (core, crm, project, mail)
      #   - Redis for distributed caching
      #   - RabbitMQ as messaging fallback
      #   - 6 application services (core, crm, project, mail, reporting, admin)
      #   - API Gateway on port 5000
      #
      # All services are built from source using multi-stage Dockerfiles
      # and configured to use LocalStack for messaging (SNS/SQS) and
      # file storage (S3) per AAP 0.8.3.
      # -----------------------------------------------------------------------
      - name: Start LocalStack Docker Compose stack
        run: |
          echo "=== Starting full LocalStack stack ==="
          docker compose \
            -f docker-compose.localstack.yml \
            up -d --build --wait \
            2>&1 | tail -100

          echo ""
          echo "=== Running containers ==="
          docker compose -f docker-compose.localstack.yml ps

      # -----------------------------------------------------------------------
      # Step 8: Wait for LocalStack to be healthy and responsive
      #
      # LocalStack health endpoint returns JSON with service status.
      # We poll until all required services (sqs, sns, s3) report as
      # "available" or "running", with a 120-second timeout.
      # -----------------------------------------------------------------------
      - name: Wait for LocalStack readiness
        run: |
          echo "Waiting for LocalStack health endpoint..."
          timeout 120 bash -c '
            until curl -sf http://localhost:4566/_localstack/health | \
              python3 -c "import sys,json; d=json.load(sys.stdin); \
                services=d.get(\"services\",{}); \
                assert all(s in services for s in [\"sqs\",\"sns\",\"s3\"]), \
                  f\"Missing services: {services}\"; \
                print(\"LocalStack services ready:\", services)" 2>/dev/null; do
              echo "  ...LocalStack not ready yet, retrying in 5s"
              sleep 5
            done
          '
          echo ""
          echo "=== LocalStack health ==="
          curl -s http://localhost:4566/_localstack/health | python3 -m json.tool

      # -----------------------------------------------------------------------
      # Step 9: Wait for the API Gateway to respond
      #
      # The Gateway is the last service to come up since it depends on all
      # backend services. Port 5000 maps to the Gateway's internal port 8080.
      # -----------------------------------------------------------------------
      - name: Wait for Gateway readiness
        run: |
          echo "Waiting for API Gateway on port 5000..."
          timeout 180 bash -c '
            until curl -sf http://localhost:5000/health -o /dev/null; do
              echo "  ...Gateway not ready yet, retrying in 5s"
              sleep 5
            done
          '
          echo "Gateway is ready!"
          echo ""
          echo "=== Gateway health response ==="
          curl -s http://localhost:5000/health || echo "(No JSON body)"

      # -----------------------------------------------------------------------
      # Step 10: Verify all infrastructure services are healthy
      #
      # Quick connectivity checks to each infrastructure component exposed
      # on the host via docker-compose.localstack.yml port mappings.
      # -----------------------------------------------------------------------
      - name: Verify infrastructure services
        run: |
          echo "=== Checking PostgreSQL instances ==="
          for port in 15432 15433 15434 15435; do
            if docker compose -f docker-compose.localstack.yml exec -T \
              $(docker compose -f docker-compose.localstack.yml ps --format '{{.Name}}' | grep postgres | head -1) \
              pg_isready -h localhost -p 5432 2>/dev/null; then
              echo "  PostgreSQL on host port $port: OK (via container)"
            fi
          done

          echo ""
          echo "=== Checking Redis ==="
          docker compose -f docker-compose.localstack.yml exec -T redis \
            redis-cli ping || echo "Redis check via exec"

          echo ""
          echo "=== Checking RabbitMQ ==="
          docker compose -f docker-compose.localstack.yml exec -T rabbitmq \
            rabbitmq-diagnostics -q ping || echo "RabbitMQ check via exec"

          echo ""
          echo "=== Checking LocalStack S3 ==="
          curl -s http://localhost:4566/_localstack/health | \
            python3 -c "import sys,json; print(json.load(sys.stdin))" || true

          echo ""
          echo "=== Container status ==="
          docker compose -f docker-compose.localstack.yml ps --format 'table {{.Name}}\t{{.Status}}\t{{.Ports}}'

      # -----------------------------------------------------------------------
      # Step 11: Run LocalStack init provisioning (if not auto-executed)
      #
      # The init-aws.sh is mounted into LocalStack's ready.d directory and
      # should auto-run on startup. This step serves as a safety net to
      # ensure SNS topics, SQS queues, and S3 buckets are provisioned.
      # -----------------------------------------------------------------------
      - name: Verify LocalStack resource provisioning
        run: |
          echo "=== Verifying SNS Topics ==="
          aws --endpoint-url=http://localhost:4566 --region us-east-1 \
            sns list-topics 2>/dev/null || \
            echo "SNS topics not yet provisioned (init-aws.sh may still be running)"

          echo ""
          echo "=== Verifying SQS Queues ==="
          aws --endpoint-url=http://localhost:4566 --region us-east-1 \
            sqs list-queues 2>/dev/null || \
            echo "SQS queues not yet provisioned"

          echo ""
          echo "=== Verifying S3 Buckets ==="
          aws --endpoint-url=http://localhost:4566 --region us-east-1 \
            s3 ls 2>/dev/null || \
            echo "S3 buckets not yet provisioned"

          echo ""
          echo "=== Re-running init script as safety net ==="
          if [ -f infrastructure/localstack/init-aws.sh ]; then
            docker compose -f docker-compose.localstack.yml exec -T localstack \
              bash /etc/localstack/init/ready.d/init-aws.sh || \
              echo "Init script execution completed (may have partial failures if already provisioned)"
          fi
        env:
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
          AWS_DEFAULT_REGION: "us-east-1"

      # -----------------------------------------------------------------------
      # Step 12: Run cross-service integration tests
      #
      # Executes the WebVella.Erp.Tests.Integration project which validates
      # (per AAP 0.7.4 and 0.8.2):
      #   - Message flow through SNS/SQS (domain events between services)
      #   - File operations through S3 (upload/download via LocalStack)
      #   - Cross-service business rules (CRM→Project, Core→CRM, Mail→CRM)
      #   - Schema migration integrity (record counts, checksums)
      #   - JWT token propagation across service boundaries
      #   - BaseResponseModel envelope backward compatibility
      #   - Event consumer idempotency (duplicate delivery safety)
      #
      # Environment variables are injected for LocalStack endpoint
      # configuration (AAP 0.8.3 — injectable configuration pattern).
      # -----------------------------------------------------------------------
      - name: Run integration tests
        run: |
          dotnet test tests/WebVella.Erp.Tests.Integration/ \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=integration-results.trx" \
            --logger "console;verbosity=detailed" \
            --results-directory ./test-results \
            -- RunConfiguration.TestSessionTimeout=1800000
        env:
          # LocalStack AWS endpoints (injectable per AAP 0.8.3)
          AWS__ServiceURL: "http://localhost:4566"
          AWS__AuthenticationRegion: "us-east-1"
          AWS__UseHttp: "true"
          AWS__UseLocalStack: "true"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
          AWS_DEFAULT_REGION: "us-east-1"

          # Gateway URL for HTTP/REST integration tests
          Gateway__BaseUrl: "http://localhost:5000"

          # Direct database connections for schema migration validation
          # Port mappings match docker-compose.localstack.yml host ports
          ConnectionStrings__Core: "Host=localhost;Port=15432;Database=erp_core;Username=dev;Password=dev;Pooling=true;MinPoolSize=1;MaxPoolSize=20;CommandTimeout=120;"
          ConnectionStrings__Crm: "Host=localhost;Port=15433;Database=erp_crm;Username=dev;Password=dev;Pooling=true;MinPoolSize=1;MaxPoolSize=20;CommandTimeout=120;"
          ConnectionStrings__Project: "Host=localhost;Port=15434;Database=erp_project;Username=dev;Password=dev;Pooling=true;MinPoolSize=1;MaxPoolSize=20;CommandTimeout=120;"
          ConnectionStrings__Mail: "Host=localhost;Port=15435;Database=erp_mail;Username=dev;Password=dev;Pooling=true;MinPoolSize=1;MaxPoolSize=20;CommandTimeout=120;"

          # Redis for cache invalidation event tests
          Redis__ConnectionString: "localhost:16379"

          # Messaging via SNS/SQS through LocalStack
          Messaging__Transport: "AmazonSQS"
          Messaging__AmazonSQS__ServiceURL: "http://localhost:4566"
          Messaging__AmazonSQS__Region: "us-east-1"
          Messaging__AmazonSQS__AccessKey: "test"
          Messaging__AmazonSQS__SecretKey: "test"

          # JWT settings for token propagation tests
          Jwt__Key: "ThisIsMySecretKeyThisIsMySecretKeyThisIsMySecretKey"
          Jwt__Issuer: "webvella-erp"
          Jwt__Audience: "webvella-erp"

          # S3 file storage via LocalStack
          Storage__Provider: "S3"
          Storage__S3__ServiceURL: "http://localhost:4566"
          Storage__S3__BucketName: "erp-files"
          Storage__S3__Region: "us-east-1"
          Storage__S3__AccessKey: "test"
          Storage__S3__SecretKey: "test"
          Storage__S3__ForcePathStyle: "true"

      # -----------------------------------------------------------------------
      # Step 13: Upload integration test results as artifacts
      # Always runs to preserve test results even on failure.
      # -----------------------------------------------------------------------
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            ./test-results/**/*.trx
            ./test-results/**/*.xml
          retention-days: 30
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      # Step 14: Collect Docker Compose logs on failure
      # Captures all container logs for debugging service startup issues,
      # message delivery failures, and database connection problems.
      # -----------------------------------------------------------------------
      - name: Collect Docker Compose logs
        if: failure()
        run: |
          echo "=== Collecting Docker Compose logs ==="
          docker compose -f docker-compose.localstack.yml logs \
            --timestamps --no-color \
            > docker-compose-logs.txt 2>&1

          echo ""
          echo "=== Container status at failure ==="
          docker compose -f docker-compose.localstack.yml ps \
            --format 'table {{.Name}}\t{{.Status}}\t{{.Ports}}' \
            > container-status.txt 2>&1
          cat container-status.txt

          echo ""
          echo "=== LocalStack health at failure ==="
          curl -s http://localhost:4566/_localstack/health | \
            python3 -m json.tool > localstack-health.json 2>&1 || \
            echo '{"error": "LocalStack unreachable"}' > localstack-health.json
          cat localstack-health.json

      # -----------------------------------------------------------------------
      # Step 15: Upload Docker logs as artifacts on failure
      # -----------------------------------------------------------------------
      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: |
            docker-compose-logs.txt
            container-status.txt
            localstack-health.json
          retention-days: 14
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      # Step 16: Tear down the Docker Compose stack
      # ALWAYS runs to prevent resource leaks on the GitHub Actions runner.
      # Uses -v to remove named volumes and free disk space.
      # -----------------------------------------------------------------------
      - name: Tear down LocalStack stack
        if: always()
        run: |
          echo "=== Tearing down LocalStack stack ==="
          docker compose -f docker-compose.localstack.yml down \
            --volumes --remove-orphans --timeout 30
          echo ""
          echo "=== Remaining containers (should be empty) ==="
          docker ps --format 'table {{.Names}}\t{{.Status}}' || true
          echo ""
          echo "=== Disk space after cleanup ==="
          df -h /
