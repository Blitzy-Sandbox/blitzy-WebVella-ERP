# =============================================================================
# WebVella ERP Microservices — Mail/Notification Service Deployment
# =============================================================================
# Kubernetes Deployment manifest for the Mail/Notification Service
# (WebVella.Erp.Service.Mail). Extracted from the monolith's
# WebVella.Erp.Plugins.Mail plugin, this service owns the email/notification
# domain boundary within the WebVella ERP microservices architecture.
#
# Responsibilities:
#   - Email entity management (email, smtp_service record CRUD)
#   - SMTP email sending via MailKit integration
#   - Email queue processing (enqueue, dequeue, retry, dead-letter)
#   - SMTP service configuration management
#   - Scheduled mail queue processing (ProcessMailQueueJob background worker)
#   - Domain event consumption for notification triggers from other services
#   - Contact resolution via CRM service for recipient information
#
# Cross-Service Dependencies:
#   - Core service (http://core-service:8080): User/role resolution via gRPC
#     for audit fields (created_by, modified_by) and RecordPermissions
#     validation. Per AAP Section 0.7.1 — cross-service relation resolution.
#   - RabbitMQ (rabbitmq-service): Asynchronous event-driven communication
#     replacing the monolith's in-process hook system (IErpPreCreateRecordHook,
#     IErpPostCreateRecordHook, etc.) and PostgreSQL LISTEN/NOTIFY pub/sub.
#     Mail service subscribes to domain events from Core, CRM, and Project
#     services to trigger notification emails.
#   - Redis (redis-service): Distributed caching for entity metadata with
#     event-driven invalidation across service replicas.
#
# Database:
#   - Owns its own PostgreSQL database (erp_mail) per the database-per-service
#     model (AAP Section 0.1.2). Contains rec_email, rec_smtp_service tables
#     and related system tables for email queue management.
#   - Connection pooling: MinPoolSize=1, MaxPoolSize=100 per AAP 0.8.3.
#
# Background Jobs:
#   - ProcessMailQueueJob: Scheduled background worker that processes the
#     outbound email queue, sending queued emails via configured SMTP services
#     using MailKit. Runs at configurable intervals within the per-service
#     job system (replaces monolith's bounded 20-thread JobPool).
#
# Prerequisites:
#   Apply namespace.yml first to create the webvella-erp namespace and secrets:
#     kubectl apply -f infrastructure/kubernetes/namespace.yml
#   Apply services.yml to create ClusterIP service definitions:
#     kubectl apply -f infrastructure/kubernetes/services.yml
#
# Usage:
#   kubectl apply -f infrastructure/kubernetes/mail-deployment.yml
#
# Per AAP Section 0.4.1 — Target Design / Refactored Structure Planning.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-service
  namespace: webvella-erp
  labels:
    app: mail-service
    app.kubernetes.io/name: mail-service
    app.kubernetes.io/part-of: webvella-erp
    app.kubernetes.io/component: mail
    app.kubernetes.io/managed-by: kubectl
  annotations:
    description: >-
      Mail/Notification Service deployment — manages email entity CRUD, SMTP
      email delivery via MailKit, email queue processing, and SMTP service
      configuration. Runs the ProcessMailQueueJob background worker for
      scheduled outbound email processing. Consumes domain events from other
      services for notification triggers. Extracted from
      WebVella.Erp.Plugins.Mail.
spec:
  # -------------------------------------------------------------------------
  # Replica count: Default 1 for development. Scale horizontally in production
  # based on email sending throughput and queue processing requirements.
  # Mail service is stateless — all state resides in the erp_mail PostgreSQL
  # database and Redis distributed cache, enabling safe horizontal scaling.
  # Note: When running multiple replicas, the ProcessMailQueueJob background
  # worker uses distributed coordination via Redis advisory locks to prevent
  # duplicate email sending.
  # -------------------------------------------------------------------------
  replicas: 1

  selector:
    matchLabels:
      app: mail-service

  # -------------------------------------------------------------------------
  # Rolling update strategy ensures zero-downtime deployments.
  # maxSurge: 1 — allows one additional pod during rollout
  # maxUnavailable: 0 — never takes down the existing pod before the new
  #   one is ready (ensures no emails are lost during deployment)
  # -------------------------------------------------------------------------
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: mail-service
        app.kubernetes.io/name: mail-service
        app.kubernetes.io/part-of: webvella-erp
        app.kubernetes.io/component: mail
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1654
      containers:
        - name: mail-service
          image: webvella-erp/mail-service:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false

          # -----------------------------------------------------------------
          # Port definitions
          # -----------------------------------------------------------------
          ports:
            # REST API endpoint — email entity CRUD, SMTP service management,
            # and mail queue operations
            - name: http
              containerPort: 8080
              protocol: TCP

          # -----------------------------------------------------------------
          # Resource allocation
          # -----------------------------------------------------------------
          # Mail service receives standard resource allocations appropriate
          # for a domain service handling email entity CRUD, SMTP sending
          # via MailKit, and background queue processing.
          # -----------------------------------------------------------------
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # -----------------------------------------------------------------
          # Environment Variables
          # -----------------------------------------------------------------
          env:
            # ---------------------------------------------------------------
            # Database Configuration (database-per-service model)
            # ---------------------------------------------------------------
            # Mail service owns its own PostgreSQL database (erp_mail) per
            # AAP Section 0.1.2 and 0.7.4. Connection string follows Npgsql
            # format with pooling configured per AAP 0.8.3:
            #   MinPoolSize=1, MaxPoolSize=100, CommandTimeout=120
            # Database contains: rec_email, rec_smtp_service tables and
            #   related system tables for email queue management.
            # Pattern: Server=postgres-mail;Port=5432;User Id=dev;Password=dev;
            #   Database=erp_mail;Pooling=true;MinPoolSize=1;MaxPoolSize=100;
            #   CommandTimeout=120;
            # ---------------------------------------------------------------
            - name: ConnectionStrings__Default
              valueFrom:
                secretKeyRef:
                  name: webvella-erp-secrets
                  key: mail-db-connection-string

            # ---------------------------------------------------------------
            # ASP.NET Core Runtime Configuration
            # ---------------------------------------------------------------
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"

            # ---------------------------------------------------------------
            # Distributed Redis Cache
            # ---------------------------------------------------------------
            # Used for entity metadata caching with event-driven invalidation
            # across service replicas. Replaces the monolith's IMemoryCache
            # (1-hour TTL) with distributed cache coherence.
            # Per AAP Section 0.1.2 and 0.5.1 (Cache.cs transformation).
            # ---------------------------------------------------------------
            - name: Redis__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: webvella-erp-secrets
                  key: redis-connection-string

            # ---------------------------------------------------------------
            # RabbitMQ Message Broker
            # ---------------------------------------------------------------
            # Used for asynchronous inter-service event-driven communication
            # via MassTransit. Replaces the monolith's in-process hook system
            # (IErpPostCreateRecordHook, IErpPostUpdateRecordHook, etc.)
            # for email entities and PostgreSQL LISTEN/NOTIFY pub/sub.
            #
            # Mail service subscribes to events:
            #   - ContactCreated, ContactUpdated (from CRM) — resolve
            #     recipient information for outbound emails
            #   - TaskCreated, TaskUpdated (from Project) — trigger
            #     notification emails for task assignments and updates
            #   - UserCreated (from Core) — welcome email notifications
            # Mail service publishes events:
            #   - EmailSent — notification that an email was successfully sent
            #   - EmailFailed — notification of email delivery failure
            # ---------------------------------------------------------------
            - name: RabbitMq__Host
              value: "rabbitmq-service"
            - name: RabbitMq__Username
              valueFrom:
                secretKeyRef:
                  name: webvella-erp-secrets
                  key: rabbitmq-username
            - name: RabbitMq__Password
              valueFrom:
                secretKeyRef:
                  name: webvella-erp-secrets
                  key: rabbitmq-password

            # ---------------------------------------------------------------
            # JWT Authentication Configuration
            # ---------------------------------------------------------------
            # Mail service validates JWT tokens issued by the Core service.
            # All services share the same signing key, issuer, and audience
            # to enable cross-service identity propagation without callback
            # to the Core authentication service.
            # Values sourced from WebVella.Erp.Site/Config.json Settings:Jwt.
            # Per AAP Section 0.8.3 — JWT propagation across services.
            # ---------------------------------------------------------------
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: webvella-erp-secrets
                  key: jwt-key
            - name: Jwt__Issuer
              valueFrom:
                secretKeyRef:
                  name: webvella-erp-secrets
                  key: jwt-issuer
            - name: Jwt__Audience
              valueFrom:
                secretKeyRef:
                  name: webvella-erp-secrets
                  key: jwt-audience

            # ---------------------------------------------------------------
            # Background Jobs Configuration
            # ---------------------------------------------------------------
            # Mail service runs the ProcessMailQueueJob background worker
            # for scheduled outbound email queue processing. The job polls
            # the email queue at configurable intervals and sends pending
            # emails via configured SMTP services using MailKit.
            # Per AAP Section 0.5.1 — service-scoped job system.
            # ---------------------------------------------------------------
            - name: Jobs__Enabled
              value: "true"

            # ---------------------------------------------------------------
            # Email Feature Configuration
            # ---------------------------------------------------------------
            # Controls whether the email sending functionality is active.
            # When enabled, the ProcessMailQueueJob processes the outbound
            # email queue and sends emails via configured SMTP services.
            # Mapped from monolith's Config.json "EmailEnabled" setting.
            # Set to "true" for production; "false" disables sending while
            # preserving queue and entity management functionality.
            # ---------------------------------------------------------------
            - name: Email__Enabled
              value: "true"

          # -----------------------------------------------------------------
          # Health Probes
          # -----------------------------------------------------------------
          # Mail service startup requires:
          #   1. Database connectivity to erp_mail PostgreSQL
          #   2. EF Core migration execution (Mail schema)
          #   3. RabbitMQ connection establishment for event bus
          #   4. Redis cache connection for distributed metadata
          #   5. SMTP service configuration validation (optional — service
          #      starts even if SMTP is not yet configured)
          # -----------------------------------------------------------------

          # Liveness probe — restart the container if it becomes unresponsive.
          # Mail-specific health endpoint checks internal service health
          # independent of downstream dependencies (SMTP server availability
          # is NOT checked by liveness — only internal process health).
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5

          # Readiness probe — stop routing traffic until the service is ready
          # to accept requests (DB connected, cache warmed, migrations done,
          # event bus connected). SMTP connectivity is checked as a degraded
          # health status, not a readiness blocker.
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
