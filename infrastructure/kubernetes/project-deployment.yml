# =============================================================================
# WebVella ERP Microservices — Project/Task Service Deployment
# =============================================================================
# Kubernetes Deployment manifest for the Project/Task Service
# (WebVella.Erp.Service.Project). Extracted from the monolith's
# WebVella.Erp.Plugins.Project plugin. This service owns the project
# management domain boundary within the WebVella ERP microservices
# architecture.
#
# Responsibilities:
#   - Task entity management (CRUD, lifecycle, scheduling, assignment)
#   - Timelog entity management (time tracking per task/project)
#   - Comment entity management (threaded discussions on tasks/projects)
#   - Feed entity management (activity streams and notifications)
#   - Project reporting (task status aggregation, timelog summaries)
#   - Background job processing — StartTasksOnStartDateJob for scheduled
#     task activation on their designated start dates
#   - Domain event publishing (TaskCreated, TaskUpdated, TimelogAdded,
#     etc.) for cross-service coordination with Reporting and Mail services
#   - Event subscription for inbound events from CRM service (account and
#     case updates affecting project relations) and Core service (user/role
#     changes affecting project record ownership and permissions)
#
# Cross-Service Dependencies:
#   - Core service (http://core-service:8080): User/role resolution via gRPC
#     for audit fields (created_by, modified_by) and RecordPermissions
#     validation. Per AAP Section 0.7.1 — cross-service relation resolution.
#   - CRM service (http://crm-service:8080): Account-project and case-task
#     cross-service relations. Project stores denormalized account_id and
#     case_id with eventual consistency via CRM domain events.
#     Per AAP Section 0.7.1 — cross-service relation resolution strategy.
#   - RabbitMQ (rabbitmq-service): Asynchronous event-driven communication
#     replacing the monolith's in-process hook system (IErpPreCreateRecordHook,
#     IErpPostCreateRecordHook, etc.) and PostgreSQL LISTEN/NOTIFY pub/sub.
#   - Redis (redis-service): Distributed caching for entity metadata with
#     event-driven invalidation across service replicas.
#
# Database:
#   - Owns its own PostgreSQL database (erp_project) per the database-per-
#     service model (AAP Section 0.1.2). Contains rec_task, rec_timelog,
#     rec_comment, rec_feed, rec_task_type tables and related rel_* join
#     tables. Cross-service references (account_id, case_id) are stored as
#     denormalized UUIDs — not foreign keys.
#
# Prerequisites:
#   Apply namespace.yml first to create the webvella-erp namespace and secrets:
#     kubectl apply -f infrastructure/kubernetes/namespace.yml
#   Apply services.yml to create ClusterIP service definitions:
#     kubectl apply -f infrastructure/kubernetes/services.yml
#
# Usage:
#   kubectl apply -f infrastructure/kubernetes/project-deployment.yml
#
# Per AAP Section 0.4.1 — Target Design / Refactored Structure Planning.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-service
  namespace: webvella-erp
  labels:
    app: project-service
    app.kubernetes.io/name: project-service
    app.kubernetes.io/part-of: webvella-erp
    app.kubernetes.io/component: project
    app.kubernetes.io/managed-by: kubectl
  annotations:
    description: >-
      Project/Task Service deployment — manages task, timelog, comment, feed,
      and project entities. Runs the StartTasksOnStartDateJob background worker
      for scheduled task activation and publishes domain events for cross-service
      coordination with Reporting and Mail services. Extracted from
      WebVella.Erp.Plugins.Project.
spec:
  # -------------------------------------------------------------------------
  # Replica count: Default 1 for development. Scale horizontally in production
  # based on project/task query load and event processing throughput
  # requirements. Project service is stateless — all state resides in the
  # erp_project PostgreSQL database and Redis distributed cache, enabling
  # safe horizontal scaling.
  # Note: The StartTasksOnStartDateJob background worker uses distributed
  # locking via Redis advisory locks to prevent duplicate execution when
  # running multiple replicas.
  # -------------------------------------------------------------------------
  replicas: 1

  selector:
    matchLabels:
      app: project-service

  # -------------------------------------------------------------------------
  # Rolling update strategy ensures zero-downtime deployments.
  # maxSurge: 1 — allows one additional pod during rollout
  # maxUnavailable: 0 — never takes down the existing pod before the new
  #   one is ready (ensures continuous Project API availability)
  # -------------------------------------------------------------------------
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: project-service
        app.kubernetes.io/name: project-service
        app.kubernetes.io/part-of: webvella-erp
        app.kubernetes.io/component: project
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1654
      containers:
        - name: project-service
          image: webvella-erp/project-service:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false

          # -----------------------------------------------------------------
          # Port definitions
          # -----------------------------------------------------------------
          ports:
            # REST API endpoint — task, timelog, comment, feed, project
            # CRUD and management operations
            - name: http
              containerPort: 8080
              protocol: TCP

          # -----------------------------------------------------------------
          # Resource allocation
          # -----------------------------------------------------------------
          # Project service receives standard resource allocations appropriate
          # for a domain service handling entity CRUD operations, background
          # job execution (StartTasksOnStartDateJob), timelog aggregation,
          # feed generation, and event processing.
          # -----------------------------------------------------------------
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # -----------------------------------------------------------------
          # Environment Variables
          # -----------------------------------------------------------------
          env:
            # ---------------------------------------------------------------
            # Database Configuration (database-per-service model)
            # ---------------------------------------------------------------
            # Project service owns its own PostgreSQL database (erp_project)
            # per AAP Section 0.1.2 and 0.7.4. Connection string follows
            # Npgsql format with pooling configured per AAP 0.8.3:
            #   MinPoolSize=1, MaxPoolSize=100, CommandTimeout=120
            # Database contains: rec_task, rec_timelog, rec_comment,
            #   rec_feed, rec_task_type, and related rel_* join tables.
            # Pattern: Server=postgres-project;Port=5432;User Id=dev;
            #   Password=dev;Database=erp_project;Pooling=true;
            #   MinPoolSize=1;MaxPoolSize=100;CommandTimeout=120;
            # ---------------------------------------------------------------
            - name: ConnectionStrings__Default
              valueFrom:
                secretKeyRef:
                  name: webvella-erp-secrets
                  key: project-db-connection-string

            # ---------------------------------------------------------------
            # ASP.NET Core Runtime Configuration
            # ---------------------------------------------------------------
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"

            # ---------------------------------------------------------------
            # Distributed Redis Cache
            # ---------------------------------------------------------------
            # Used for entity metadata caching with event-driven invalidation
            # across service replicas. Replaces the monolith's IMemoryCache
            # (1-hour TTL) with distributed cache coherence.
            # Per AAP Section 0.1.2 and 0.5.1 (Cache.cs transformation).
            # ---------------------------------------------------------------
            - name: Redis__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: webvella-erp-secrets
                  key: redis-connection-string

            # ---------------------------------------------------------------
            # RabbitMQ Message Broker
            # ---------------------------------------------------------------
            # Used for asynchronous inter-service event-driven communication
            # via MassTransit. Replaces the monolith's in-process hook system
            # (IErpPostCreateRecordHook, IErpPostUpdateRecordHook, etc.)
            # for project entities and PostgreSQL LISTEN/NOTIFY pub/sub.
            #
            # Project publishes events:
            #   - TaskCreated, TaskUpdated, TaskDeleted
            #   - TimelogCreated, TimelogUpdated, TimelogDeleted
            #   - CommentCreated, CommentUpdated, CommentDeleted
            #   - FeedItemCreated
            # Project subscribes to events:
            #   - AccountUpdated (from CRM) — update account-project links
            #   - CaseUpdated (from CRM) — update case-task associations
            #   - UserUpdated (from Core) — update project record ownership
            #   - RoleUpdated (from Core) — update project record permissions
            # ---------------------------------------------------------------
            - name: RabbitMq__Host
              value: "rabbitmq-service"
            - name: RabbitMq__Username
              valueFrom:
                secretKeyRef:
                  name: webvella-erp-secrets
                  key: rabbitmq-username
            - name: RabbitMq__Password
              valueFrom:
                secretKeyRef:
                  name: webvella-erp-secrets
                  key: rabbitmq-password

            # ---------------------------------------------------------------
            # JWT Authentication Configuration
            # ---------------------------------------------------------------
            # Project service validates JWT tokens issued by the Core service.
            # All services share the same signing key, issuer, and audience
            # to enable cross-service identity propagation without callback
            # to the Core authentication service.
            # Values sourced from WebVella.Erp.Site/Config.json Settings:Jwt.
            # Per AAP Section 0.8.3 — JWT propagation across services.
            # ---------------------------------------------------------------
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: webvella-erp-secrets
                  key: jwt-key
            - name: Jwt__Issuer
              valueFrom:
                secretKeyRef:
                  name: webvella-erp-secrets
                  key: jwt-issuer
            - name: Jwt__Audience
              valueFrom:
                secretKeyRef:
                  name: webvella-erp-secrets
                  key: jwt-audience

            # ---------------------------------------------------------------
            # Background Jobs Configuration
            # ---------------------------------------------------------------
            # Project service runs the StartTasksOnStartDateJob background
            # worker that activates tasks when their scheduled start date
            # arrives. This job runs on a periodic schedule (inherited from
            # WebVella.Erp.Plugins.Project/Jobs/StartTasksOnStartDate.cs).
            # Per AAP Section 0.5.1 — service-scoped job system.
            # ---------------------------------------------------------------
            - name: Jobs__Enabled
              value: "true"

            # ---------------------------------------------------------------
            # Cross-Service Communication — Core Service URL
            # ---------------------------------------------------------------
            # Project service communicates with the Core Platform Service for:
            #   - User/role resolution (audit fields: created_by, modified_by)
            #   - Entity metadata lookups (shared entity definitions)
            #   - RecordPermissions validation via SecurityGrpcService
            # Service name matches the ClusterIP service defined in
            # services.yml (core-service:8080).
            # Per AAP Section 0.7.1 — cross-service relation resolution.
            # ---------------------------------------------------------------
            - name: Services__Core__Url
              value: "http://core-service:8080"

            # ---------------------------------------------------------------
            # Cross-Service Communication — CRM Service URL
            # ---------------------------------------------------------------
            # Project service communicates with the CRM Service for:
            #   - Account-project relation resolution (account_id lookups)
            #   - Case-task association resolution (case_id lookups)
            # Cross-service entity references are stored as denormalized
            # UUIDs in the project database. When full entity data is needed
            # (e.g., account name for display), the Project service calls
            # the CRM service REST/gRPC API.
            # Service name matches the ClusterIP service defined in
            # services.yml (crm-service:8080).
            # Per AAP Section 0.7.1 — cross-service relation resolution
            # strategy: denormalized IDs + API calls on read.
            # ---------------------------------------------------------------
            - name: Services__Crm__Url
              value: "http://crm-service:8080"

            # ---------------------------------------------------------------
            # EQL (Entity Query Language) Configuration
            # ---------------------------------------------------------------
            # Query timeout preserved from monolith at 600 seconds (10 min).
            # The Project service uses the EQL engine from SharedKernel for
            # intra-service queries across task, timelog, comment, feed, and
            # task_type entities. Cross-service relation queries (e.g.,
            # task→account spanning Project→CRM) degrade gracefully to API
            # composition via the Gateway.
            # Per AAP Section 0.8.3 — EQL query timeout preservation.
            # ---------------------------------------------------------------
            - name: Eql__QueryTimeoutSeconds
              value: "600"

            # ---------------------------------------------------------------
            # Entity Metadata Cache Configuration
            # ---------------------------------------------------------------
            # TTL for entity metadata cache preserved from monolith at
            # 60 minutes (1 hour). Project entity definitions, field types,
            # and relation metadata are cached locally and in Redis.
            # Per AAP Section 0.8.3 — cache TTL preservation.
            # ---------------------------------------------------------------
            - name: Cache__EntityMetadataTtlMinutes
              value: "60"

          # -----------------------------------------------------------------
          # Health Probes
          # -----------------------------------------------------------------
          # Project service startup must wait for:
          #   1. Database connectivity to erp_project PostgreSQL
          #   2. EF Core migration execution (project schema)
          #   3. RabbitMQ connection establishment for event bus
          #   4. Redis cache connection for distributed metadata
          #   5. Core service availability for gRPC user/role resolution
          #   6. Background job scheduler initialization
          #      (StartTasksOnStartDateJob registration)
          # -----------------------------------------------------------------

          # Liveness probe — restart the container if it becomes unresponsive.
          # Project-specific health endpoint checks internal service health
          # independent of downstream dependencies.
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5

          # Readiness probe — stop routing traffic until the service is ready
          # to accept requests (DB connected, cache warmed, migrations done,
          # event bus connected, Core service reachable, jobs initialized).
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
